[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service
cover-html=1
cover-html-dir=htmlcov

[coverage:run]
source = service
omit =
    service/__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
show_missing = True

[flake8]
max-line-length = 127
exclude = .git,__pycache__,.pytest_cache,htmlcov,venv,.venv
max-complexity = 10

[pylint]
max-line-length = 127
disable = too-few-public-methods,missing-module-docstring
